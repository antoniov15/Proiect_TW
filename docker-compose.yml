version: '3.8'

services:
  # eureka-server and api-gateway services will be added here before running the full stack

  microservice-account:
    build:
      context: ./microservice-account
      dockerfile: Dockerfile
    ports:
      - "8083:8080"
    networks:
      - microservices-network

  microservice-transactions:
    build:
      context: ./microservice-transactions
      dockerfile: Dockerfile
    environment:
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka
      - TRANSACTION_DB_URL=jdbc:postgresql://postgres:5432/finance_app_db
      - TRANSACTION_DB_USERNAME=postgres
      - TRANSACTION_DB_PASSWORD=postgres
    ports:
      - "8082:8082"
    networks:
      - microservices-network

  microservice-ai:
    build:
      context: ./microservice-ai
      dockerfile: Dockerfile
    ports:
      - "8084:8080"
    networks:
      - microservices-network

networks:
  microservices-network:
    driver: bridge