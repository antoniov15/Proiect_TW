version: '3.8'

services:
  #--------------- Eureka Server ---------------
  eurekaserver:
    build:
      context: ./eurekaserver
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      EUREKA_INSTANCE_HOSTNAME: eurekaserver
    ports:
      - "${EUREKA_SERVER_PORT:-8070}:8070"
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8070/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  #--------------- Gateway Server ---------------
  gatewayserver:
    build:
      context: ./gatewayserver
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eurekaserver:8070/eureka/
    ports:
      - "${GATEWAY_SERVER_PORT:-8072}:8072"
    networks:
      - microservices-network
    depends_on:
      eurekaserver:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8072/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  #--------------- PostgreSQL Database ---------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db_setup.sql:/docker-entrypoint-initdb.d/db_setup.sql:ro
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  #--------------- Microservice Account ---------------
  microservice-account:
    build:
      context: ./microservice-account
      dockerfile: Dockerfile
    restart: on-failure
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eurekaserver:8070/eureka/
    ports:
      - "${ACCOUNT_SERVICE_PORT}:8081"
    networks:
      - microservices-network
    depends_on:
      postgres:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy

  #--------------- Microservice AI ---------------
  microservice-ai:
    build:
      context: ./microservice-ai
      dockerfile: Dockerfile
    restart: on-failure
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      AI_API_URL: ${AI_API_URL}
      AI_API_KEY: ${AI_API_KEY}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eurekaserver:8070/eureka/
    ports:
      - "${AI_SERVICE_PORT}:8080"
    networks:
      - microservices-network
    depends_on:
      postgres:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy

  #--------------- Microservice Transactions ---------------
  microservice-transactions:
    build:
      context: ./microservice-transactions
      dockerfile: Dockerfile
    restart: on-failure
    environment:
      TRANSACTION_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      TRANSACTION_DB_USERNAME: ${POSTGRES_USER}
      TRANSACTION_DB_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eurekaserver:8070/eureka/
    ports:
      - "${TRANSACTION_SERVICE_PORT}:8082"
    networks:
      - microservices-network
    depends_on:
      postgres:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy

networks:
  microservices-network:
    driver: bridge

volumes:
  pgdata:
