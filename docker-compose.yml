services:
  # Baza de date Account
  accountsdb:
    container_name: accountsdb
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    image: postgres:15
    volumes:
      - ./db_setup.sql:/docker-entrypoint-initdb.d/db_setup.sql
    networks:
      - finance-network

  # Baza de date Transactions
  transactionsdb:
    container_name: transactionsdb
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    image: postgres:15
    volumes:
      - ./db_setup.sql:/docker-entrypoint-initdb.d/db_setup.sql
    networks:
      - finance-network

  aidb:
    container_name: aidb
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    image: postgres:15
    volumes:
      - ./db_setup.sql:/docker-entrypoint-initdb.d/db_setup.sql
    networks:
      - finance-network

  # Zipkin (NOU - Pentru Tracing)
  zipkin:
    image: openzipkin/zipkin
    ports:
      - "9411:9411"
    networks:
      - finance-network
    extends:
      file: common-config.yml
      service: microservice-base-config

  # Eureka Server
  eurekaserver:
    image: eurekaserver
    container_name: eurekaserver
    ports:
      - "8070:8070"
    build:
      context: ./eurekaserver
      dockerfile: Dockerfile
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8070/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    extends:
      file: common-config.yml
      service: microservice-base-config

  # Microservice Account
  microservice-account:
    image: microservice-account
    container_name: microservice-account
    build:
      context: ./microservice-account
      dockerfile: Dockerfile
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://accountsdb:5432/finance_app_db?currentSchema=account_schema
      - TRANSACTION_DB_USERNAME=${POSTGRES_USER}
      - TRANSACTION_DB_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_PROFILES_ACTIVE=prod
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eurekaserver:8070/eureka/
    depends_on:
      accountsdb:
        condition: service_started
      eurekaserver:
        condition: service_healthy
      zipkin:
        condition: service_started
    extends:
      file: common-config.yml
      service: microservice-base-config

  # Microservice Transactions
  microservice-transactions:
    image: microservice-transactions
    # Nu punem container_name fix pentru a permite scalarea (ex: --scale microservice-transactions=2)
    build:
      context: ./microservice-transactions
      dockerfile: Dockerfile
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://transactionsdb:5432/finance_app_db?currentSchema=transaction_schema
      - TRANSACTION_DB_USERNAME=${POSTGRES_USER}
      - TRANSACTION_DB_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_PROFILES_ACTIVE=prod
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eurekaserver:8070/eureka/
    depends_on:
      transactionsdb:
        condition: service_started
      eurekaserver:
        condition: service_healthy
      zipkin:
        condition: service_started
    extends:
      file: common-config.yml
      service: microservice-base-config

  # Microservice AI
  microservice-ai:
    image: microservice-ai
    container_name: microservice-ai
    build:
      context: ./microservice-ai
      dockerfile: Dockerfile
    environment:
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=https://accounts.google.com
      - SPRING_DATASOURCE_URL=jdbc:postgresql://aidb:5432/finance_app_db?currentSchema=ai_schema
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_PROFILES_ACTIVE=prod
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eurekaserver:8070/eureka/
      - AI_API_KEY=${AI_API_KEY}
      - AI_API_URL=${AI_API_URL:-https://api.openai.com}
      - AI_MODEL=${AI_MODEL:-gpt-4o-mini}
    depends_on:
      eurekaserver:
        condition: service_healthy
      zipkin:
        condition: service_started
    extends:
      file: common-config.yml
      service: microservice-base-config

  # Gateway Server - Instanța 1 (Securizat - Default)
  gatewayserver:
    image: gatewayserver
    container_name: gatewayserver
    ports:
      - "8072:8072"
    build:
      context: ./gatewayserver
      dockerfile: Dockerfile
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eurekaserver:8070/eureka/
      - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_SCOPE=openid,profile,email
      - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_REDIRECT_URI={baseUrl}/login/oauth2/code/{registrationId}
      - SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_GOOGLE_ISSUER_URI=https://accounts.google.com
    depends_on:
      microservice-account:
        condition: service_started
      microservice-transactions:
        condition: service_started
      eurekaserver:
        condition: service_healthy
      zipkin:
        condition: service_started
    extends:
      file: common-config.yml
      service: microservice-base-config

  # Gateway Server - Instanța 2 (Open - Pentru Testare API)
  gatewayserver-open:
    image: gatewayserver-open
    container_name: gatewayserver-open
    ports:
      - "8073:8072" # Mapăm portul 8073 al PC-ului la 8072 al containerului
    build:
      context: ./gatewayserver
      dockerfile: Dockerfile
    environment:
      - SPRING_PROFILES_ACTIVE=no-security # Profilul pe care îl vom crea mai târziu
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eurekaserver:8070/eureka/
    depends_on:
      microservice-account:
        condition: service_started
      microservice-transactions:
        condition: service_started
      eurekaserver:
        condition: service_healthy
      zipkin:
        condition: service_started
    extends:
      file: common-config.yml
      service: microservice-base-config

networks:
  finance-network:
    driver: bridge
