spring:
  main:
    web-application-type: reactive
  profiles:
    active: test
  application:
    name: gatewayserver
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope:
              - openid
              - profile
              - email
              - https://www.googleapis.com/auth/cloud-platform
            redirect-uri: "http://localhost:8072/login/oauth2/code/google"
        provider:
          google:
            #get the authorization code
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            #exchange the authorization code for an access token - client id and client secret are sent here
            token-uri: https://oauth2.googleapis.com/token
            #retrieve user details and populate the OAuth2User object
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            #username attribute used to uniquely identify the user
            user-name-attribute: sub

  zipkin:
    base-url: http://localhost:9411 #http://zipkin:9411
  sleuth:
    sampler:
      probability: 1.0

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: account-service
          uri: lb://microservice-account
          predicates:
            - Path=/microservice-account/**
          filters:
            - StripPrefix=1

        - id: transaction-service
          uri: lb://microservice-transactions
          predicates:
            - Path=/microservice-transactions/**
          filters:
            - StripPrefix=1

        - id: ai-service
          uri: lb://microservice-ai
          predicates:
            - Path=/microservice-ai/**
          filters:
            - StripPrefix=1

server:
  port: 8072

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8070/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: "*"