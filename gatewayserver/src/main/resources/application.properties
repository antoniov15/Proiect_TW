spring.application.name=gatewayserver
server.port=8072

# --- Eureka Configuration ---
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
# Folosim variabila de mediu definita in celelalte servicii pentru consistenta
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8070/eureka/}

# --- Gateway Configuration ---
# Activam descoperirea automata a rutelor bazata pe Eureka
# Gateway va crea automat rute de tip: /microservice-account/** -> lb://microservice-account
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# --- Actuator & Logging ---
management.endpoints.web.exposure.include=*
logging.level.org.springframework.cloud.gateway=INFO