server:
  port: 8070
spring:
  application:
    name: "eurekaserver"

eureka:
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
  client:
    fetchRegistry: false
    registerWithEureka: false
    serviceUrl:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/

  server:
    enable-self-preservation: false
    eviction-interval-timer-in-ms: 2000
management:
  endpoints:
    web:
      exposure:
        include: "*"