spring.application.name=microservice-transactions
server.port=8082

spring.datasource.url=${TRANSACTION_DB_URL:jdbc:postgresql://localhost:5432/finance_app_db}
spring.datasource.username=${TRANSACTION_DB_USERNAME:postgres}
spring.datasource.password=${TRANSACTION_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.default_schema=transaction_schema
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# register with Eureka when it is available (falls back to disabled if URL is empty)
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
spring.cloud.discovery.client.simple.instances.microservice-transactions[0].uri=http://localhost:${server.port}
